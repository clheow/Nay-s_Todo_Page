<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cute Todos</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  
   
  <!-- Floating background decorations - many small icons -->
  <div class="bg-decorations" aria-hidden="true">
    <!-- Row top -->
    <img class="deco" src="icon1.svg"  style="top:2%;left:3%;width:36px;animation-delay:0s;">
    <img class="deco" src="icon2.svg"  style="top:1%;left:12%;width:32px;animation-delay:-1s;">
    <img class="deco" src="icon3.svg"  style="top:3%;left:23%;width:38px;animation-delay:-2s;">
    <img class="deco" src="icon4.svg"  style="top:1%;left:36%;width:30px;animation-delay:-0.5s;">
    <img class="deco" src="icon5.svg"  style="top:2%;left:50%;width:34px;animation-delay:-3s;">
    <img class="deco" src="icon6.svg"  style="top:1%;left:63%;width:32px;animation-delay:-1.5s;">
    <img class="deco" src="icon7.svg"  style="top:3%;left:75%;width:36px;animation-delay:-2.5s;">
    <img class="deco" src="icon8.svg"  style="top:1%;left:87%;width:30px;animation-delay:-0.8s;">
    <img class="deco" src="icon9.svg"  style="top:2%;right:2%;width:34px;animation-delay:-1.8s;">
    <img class="deco" src="icon10.svg" style="top:4%;left:43%;width:32px;animation-delay:-3.5s;">
 
    <!-- Left column -->
    <img class="deco" src="icon3.svg"  style="top:10%;left:1%;width:34px;animation-delay:-0.3s;">
    <img class="deco" src="icon7.svg"  style="top:18%;left:4%;width:30px;animation-delay:-2.1s;">
    <img class="deco" src="icon1.svg"  style="top:27%;left:1%;width:36px;animation-delay:-1.4s;">
    <img class="deco" src="icon5.svg"  style="top:36%;left:3%;width:32px;animation-delay:-3.2s;">
    <img class="deco" src="icon9.svg"  style="top:45%;left:1%;width:28px;animation-delay:-0.6s;">
    <img class="deco" src="icon2.svg"  style="top:54%;left:4%;width:34px;animation-delay:-2.7s;">
    <img class="deco" src="icon6.svg"  style="top:63%;left:1%;width:30px;animation-delay:-1.1s;">
    <img class="deco" src="icon10.svg" style="top:72%;left:3%;width:36px;animation-delay:-3.8s;">
    <img class="deco" src="icon4.svg"  style="top:81%;left:1%;width:32px;animation-delay:-0.9s;">
    <img class="deco" src="icon8.svg"  style="top:90%;left:4%;width:28px;animation-delay:-2.3s;">
 
    <!-- Right column -->
    <img class="deco" src="icon2.svg"  style="top:10%;right:2%;width:32px;animation-delay:-1.6s;">
    <img class="deco" src="icon6.svg"  style="top:18%;right:4%;width:36px;animation-delay:-0.2s;">
    <img class="deco" src="icon10.svg" style="top:27%;right:2%;width:28px;animation-delay:-2.9s;">
    <img class="deco" src="icon4.svg"  style="top:36%;right:4%;width:34px;animation-delay:-1.3s;">
    <img class="deco" src="icon8.svg"  style="top:45%;right:2%;width:30px;animation-delay:-3.6s;">
    <img class="deco" src="icon1.svg"  style="top:54%;right:4%;width:36px;animation-delay:-0.7s;">
    <img class="deco" src="icon5.svg"  style="top:63%;right:2%;width:32px;animation-delay:-2.4s;">
    <img class="deco" src="icon3.svg"  style="top:72%;right:4%;width:28px;animation-delay:-1.7s;">
    <img class="deco" src="icon7.svg"  style="top:81%;right:2%;width:34px;animation-delay:-3.1s;">
    <img class="deco" src="icon9.svg"  style="top:90%;right:4%;width:30px;animation-delay:-0.4s;">
 
    <!-- Row bottom -->
    <img class="deco" src="icon5.svg"  style="bottom:3%;left:8%;width:30px;animation-delay:-1.9s;">
    <img class="deco" src="icon1.svg"  style="bottom:2%;left:20%;width:34px;animation-delay:-3.3s;">
    <img class="deco" src="icon9.svg"  style="bottom:4%;left:33%;width:28px;animation-delay:-0.6s;">
    <img class="deco" src="icon3.svg"  style="bottom:2%;left:47%;width:36px;animation-delay:-2.6s;">
    <img class="deco" src="icon7.svg"  style="bottom:3%;left:60%;width:30px;animation-delay:-1.2s;">
    <img class="deco" src="icon2.svg"  style="bottom:2%;left:72%;width:32px;animation-delay:-3.9s;">
    <img class="deco" src="icon10.svg" style="bottom:4%;left:84%;width:28px;animation-delay:-0.1s;">
  </div>

  <main class="app-container">

    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">
        <span class="sparkle-icon">✦</span>
        My Todo List
        <span class="sparkle-icon">✦</span>
      </h1>
      <p class="progress-text" id="progress-text"></p>
    </header>

    <!-- Input Card -->
    <section class="input-card">
      <div class="input-row">
        <input
          type="text"
          id="todo-input"
          class="todo-text-input"
          placeholder="What's your next activity? ✨"
          autocomplete="off"
        />
        <button id="add-btn" class="add-btn">
          <span>+</span> Add
        </button>
      </div>
      <div class="date-time-row">
        <span class="dt-icon">📅</span>
        <input type="date" id="todo-date" class="dt-input" />
        <span class="dt-icon">🕐</span>
        <input type="time" id="todo-time" class="dt-input" />
      </div>
    </section>

    <!-- Todo List -->
    <section class="todo-list-section">
      <!-- All Done Banner (sits above list, inside section) -->
      <div class="all-done-banner hidden" id="all-done-banner">
        🎉 <span>All Done! You're Amazing!</span>
      </div>

      <div class="empty-state" id="empty-state">
        <div class="empty-flower">🌸</div>
        <p>No todos yet! Add one to get started ✨</p>
      </div>
      <ul class="todo-list" id="todo-list"></ul>
    </section>

    <!-- Completed Toast Popup -->
    <div class="toast hidden" id="toast">
      <span class="toast-icon">✅</span>
      <span id="toast-msg">Todo completed!</span>
    </div>

    <!-- Footer Stats -->
    <footer class="stats-footer hidden" id="stats-footer">
      <span>Total: <strong id="stat-total">0</strong></span>
      <span class="dot-sep">·</span>
      <span>Completed: <strong id="stat-completed" class="stat-pink">0</strong></span>
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
